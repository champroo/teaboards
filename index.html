<!doctype html>
<html>
  <head>
    <title>teaboards</title>
    <meta name="description" content="A Catalog of Custom Mechanical Keyboards" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
    <script type="text/javascript" src="scripts.js"></script>
  </head>

  <body>
  <div style="text-align: center;">
    <header class="main-header">
       <div class="banner-left">
        <span class="banner-title">teaboards</span></span>
        <div class="banner-divider"></div>
        <span class="banner-desc">a catalog of mechanical keyboards</span>
      </div>
    </header>
  </div>

  <div id="main-layout">
    <div id="controls">
      <button onclick="openModal('add-modal-board')">Add Board</button>
      <button onclick="deleteBoard()">Delete Board</button>
      <div class="dropdown">
        <button onclick="dropdownFunction()" class="dropbtn">Sort By</button>
        <div id="myDropdown" class="dropdown-content">
          <a href="#" onclick="sortBoards('layout')">Layout</a>
          <a href="#" onclick="sortBoards('brand')">Name</a>
        </div>
      </div>
    </div>
    <div id="card-container">
      <div class="card" style="display: none">
      <div class="card-content">
        <h2>Keyboard</h2>
        <img class="main-image" src="" alt="" />
        <div class="thumbnails"></div>
      </div>
    </div>
  </div>
    <div id="detail-panel" style="display: none;">
      <div id="detail-header">
        <h2 id="detail-board"></h2>
        <div id="detail-buttons">
          <button id="close-btn" onclick="closeDetail('detail-panel')">Close</button>
          <button id="open-modal-board" onclick="openModal('edit-modal-board')">Edit Board</button>
          <button id="open-modal-switches" onclick="openModal('edit-modal-switches')">Edit Switches</button>
          <button id="open-modal-keycaps" onclick="openModal('edit-modal-keycaps')">Edit Keycaps</button>
        </div>
      </div>
      
      <div id="detail-specs">
          <ul id="board-specs"></ul>
       </div>
      <div class="section-header">
        <h3>Switches</h3>
      </div>
      <div id="detail-switches">
         <ul id="switch-specs"></ul>
      </div>
      <div class="section-header">
        <h3>Keycaps</h3>
      </div>
      <div id="detail-keycap">
         <ul id="keycap-specs"></ul>
      </div>
    </div>
  </div>

  <div id="edit-modal-board" style="display: none;">
    <div id="modal-content-board">
      <h2>Edit Board</h2>
      <label>Brand</label>
      <input type="text" id="edit-brand" />
      <label>Model</label>
      <input type="text" id="edit-model" />
      <label>Layout</label>
      <input type="text" id="edit-layout" />
      <label>Case Material</label>
      <input type="text" id="edit-case" />
      <label>Weight</label>
      <input type="text" id="edit-weight" />
      <label>Mount</label>
      <input type="text" id="edit-mount" />
      <label>Plate</label>
      <input type="text" id="edit-plate" />
      <label>Description</label>
      <input type="text" id="edit-description" />
      <label>Image Link</label>
      <input type="text" id="edit-images" />
      <button onclick="saveEdit('edit-modal-board')">Save</button>
      <button id="close-btn" onclick="closeDetail('edit-modal-board')">Close</button>
   </div>
  </div>

  <div id="edit-modal-switches" style="display: none;">
    <div id="modal-content-switches">
      <h2>Edit Switches</h2>
      <label>Name</label>
      <input type="text" id="edit-switchName" />
      <label>Switch Type</label>
      <input type="text" id="edit-switchType" />
      <label>Actuation Force</label>
      <input type="text" id="edit-actuationForce" />
      <button onclick="saveEdit('edit-modal-switches')">Save</button>
      <button onclick="closeDetail('edit-modal-switches')">Close</button>
   </div>
  </div>

  <div id="edit-modal-keycaps" style="display: none;">
    <div id="modal-content-keycaps">
      <h2>Edit Keycaps</h2>
      <label>Manufacturer</label>
      <input type="text" id="edit-keycapManu" />
      <label>Name</label>
      <input type="text" id="edit-keycapName" />
      <button onclick="saveEdit('edit-modal-keycaps')">Save</button>
      <button onclick="closeDetail('edit-modal-keycaps')">Close</button>
   </div>
 </div>

   <div id="add-modal-board" style="display: none;">
    <div id="modal-content-board">
      <h2>Add Board</h2>
      <label>Brand</label>
      <input type="text" id="add-brand" />
      <label>Model</label>
      <input type="text" id="add-model" />
      <label>Layout</label>
      <input type="text" id="add-layout" />
      <label>Case Material</label>
      <input type="text" id="add-case" />
      <label>Weight</label>
      <input type="text" id="add-weight" />
      <label>Mount</label>
      <input type="text" id="add-mount" />
      <label>Plate</label>
      <input type="text" id="add-plate" />
      <label>Switches</label>
      <input type="text" id="add-switchName" />
      <label>Switch Type</label>
      <input type="text" id="add-switchType" />
      <label>Actuation Force</label>
      <input type="text" id="add-actuationForce" />
      <label>Keycap Manufacturer</label>
      <input type="text" id="add-keycapManu" />
      <label>Keycap Name</label>
      <input type="text" id="add-keycapName" />
      <label>Description</label>
      <input type="text" id="add-description" />
      <label>Image Link</label>
      <input type="text" id="add-images" />
      <button onclick="addBoard('add-modal-board')">Submit</button>
      <button onclick="closeDetail('add-modal-board')">Close</button>
   </div>
  </div>

  </body>
</html>
